<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWRP — Redirigiendo…</title>
  <script>
    (function () {
      var path = window.location.pathname.replace(/\/?index\.html$/, '');
      var root = path.endsWith('/') ? path : path + '/';
      window.location.replace(root + 'public/index.html' + window.location.search + window.location.hash);
    })();
  </script>
</head>
<body>
  <p><a href="public/index.html">Entrar a Star Wars Roleplay</a></p>
</body>
</html>
