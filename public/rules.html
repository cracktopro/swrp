<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="js/swrp-base-init.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/Logo%20SW-RP.png" type="image/png">
  <title>SWRP — Reglas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
</head>
<body class="swrp-app">
  <div id="swrp-nav"></div>
  <main class="container py-4">
    <article id="rules-content" class="swrp-rules swrp-panel">
      <p class="text-muted mb-0">Cargando reglas…</p>
    </article>
  </main>

  <script type="module">
    import './js/app-bootstrap.js';
    import { renderNavbar } from './js/navbar.js';
    import { requireAuth, isAdmin } from './js/auth.js';
    import { renderRulesHtml } from './js/rules-renderer.js';

    const { user, profile } = await requireAuth();
    renderNavbar('rules', user, { isAdmin: isAdmin(profile) });

    const container = document.getElementById('rules-content');
    try {
      const res = await fetch('RULES.md', { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      container.innerHTML = renderRulesHtml(text);
    } catch (err) {
      container.innerHTML = `<p class="text-danger mb-0">No se pudieron cargar las reglas: ${err.message}</p>`;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
