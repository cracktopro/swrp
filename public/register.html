<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/Logo%20SW-RP.png" type="image/png">
  <title>SWRP — Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
</head>
<body class="swrp-app">
  <div id="swrp-nav"></div>

  <main class="hero-section">
    <div class="swrp-panel" style="width:100%;max-width:420px;">
      <h1 class="h4 mb-1">Crear Cuenta</h1>
      <p class="text-muted small mb-4">Únete a la aventura</p>
      <div id="alert" class="alert alert-swrp d-none" role="alert"></div>
      <form id="register-form">
        <div class="mb-3">
          <label class="form-label" for="username">Nombre de usuario</label>
          <input type="text" class="form-control" id="username" required minlength="3" maxlength="24">
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" required autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" class="form-control" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-swrp btn-swrp-primary w-100">Registrarse</button>
      </form>
      <p class="mt-3 mb-0 small text-center">
        ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { renderNavbar } from './js/navbar.js';
    import { register, watchAuth } from './js/auth.js';

    renderNavbar('register');

    watchAuth((user) => {
      if (user) window.location.href = 'dashboard.html';
    });

    const form = document.getElementById('register-form');
    const alertEl = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alertEl.classList.add('d-none');
      try {
        await register(
          document.getElementById('username').value.trim(),
          document.getElementById('email').value.trim(),
          document.getElementById('password').value
        );
        window.location.href = 'dashboard.html';
      } catch (err) {
        alertEl.textContent = err.message || 'Error al registrarse';
        alertEl.classList.remove('d-none');
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
