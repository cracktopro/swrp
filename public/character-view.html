<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/Logo%20SW-RP.png" type="image/png">
  <title>SWRP — Carta de Personaje</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
  <link href="css/character-card.css" rel="stylesheet">
</head>
<body class="swrp-app">
  <div id="swrp-nav"></div>
  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <a href="dashboard" class="btn btn-sm btn-swrp btn-swrp-ghost">← Dashboard</a>
      <a id="edit-link" href="#" class="btn btn-sm btn-swrp btn-swrp-primary">Editar</a>
    </div>
    <div id="page-loading" class="swrp-page-loading">Cargando personaje…</div>
    <div id="card-container" class="swrp-card-host d-none"></div>
    <div id="view-error" class="swrp-panel text-center d-none" style="max-width:480px;margin:2rem auto;">
      <p id="view-error-msg" class="text-muted mb-3"></p>
      <a href="dashboard" class="btn btn-swrp btn-swrp-primary">Volver al Dashboard</a>
    </div>
  </main>

  <script type="module">
    import { renderNavbar } from './js/navbar.js';
    import { requireAuth, isAdmin } from './js/auth.js';
    import { loadCharacterById } from './js/characters.js';
    import { renderCharacterCard } from './js/character-card.js';
    import { getCharacterIdFromUrl, characterEditUrl } from './js/character-url.js';

    function showViewError(msg) {
      document.getElementById('page-loading').classList.add('d-none');
      document.getElementById('card-container').classList.add('d-none');
      document.getElementById('view-error-msg').textContent = msg;
      document.getElementById('view-error').classList.remove('d-none');
    }

    async function initView() {
      const characterId = getCharacterIdFromUrl();
      if (!characterId) {
        window.location.href = 'dashboard';
        return;
      }

      let user;
      let profile;
      try {
        ({ user, profile } = await requireAuth());
      } catch {
        return;
      }

      renderNavbar('characters', user, { isAdmin: isAdmin(profile) });
      document.getElementById('edit-link').href = characterEditUrl(characterId);

      try {
        const result = await loadCharacterById(characterId, user.uid);
        if (result.error) {
          if (result.error === 'forbidden') {
            document.getElementById('edit-link').classList.add('d-none');
          }
          showViewError(result.message);
          return;
        }

        document.getElementById('page-loading').classList.add('d-none');
        const container = document.getElementById('card-container');
        container.classList.remove('d-none');
        container.appendChild(renderCharacterCard(result.character));
        document.title = `SWRP — ${result.character.name}`;
      } catch (err) {
        console.error(err);
        showViewError(`Error al cargar: ${err.message}`);
      }
    }

    initView().catch((err) => {
      console.error(err);
      showViewError(err.message || 'Error desconocido.');
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
