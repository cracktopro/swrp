<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="img/Logo%20SW-RP.png" type="image/png">
  <title>SWRP — Compendio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
  <link href="css/character-card.css" rel="stylesheet">
</head>
<body class="swrp-app">
  <div id="swrp-nav"></div>
  <main class="container py-4">
    <h1 class="h4 text-gold mb-4">Compendio Visual</h1>
    <p id="comp-readonly-banner" class="small text-muted mb-3 d-none">
      Modo solo lectura. Solo los administradores pueden editar el compendio.
    </p>
    <div id="comp-seed-banner" class="alert alert-swrp d-none mb-3" role="alert">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span id="comp-seed-banner-text" class="small"></span>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" id="btn-sync-seed" class="btn btn-sm btn-swrp btn-swrp-primary">Aplicar semilla a Firestore</button>
          <button type="button" id="btn-reset-compendium" class="btn btn-sm btn-swrp btn-swrp-ghost">Restaurar todo el compendio</button>
        </div>
      </div>
    </div>

    <ul class="nav nav-tabs mb-4" id="compTabs">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-stats">Progresión</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-skills">Habilidades</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-species">Especies</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-npcs">NPCs</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tab-stats">
        <div class="row g-3 mb-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Clase</label>
            <select class="form-select" id="stats-class"></select>
          </div>
          <div class="col-md-4 d-none" id="admin-stats-actions">
            <button type="button" id="btn-save-stats" class="btn btn-sm btn-swrp btn-swrp-primary">Guardar progresión</button>
          </div>
        </div>
        <div class="table-responsive swrp-panel">
          <table class="table table-dark compendium-table" id="stats-table"></table>
        </div>
      </div>

      <div class="tab-pane fade" id="tab-skills">
        <div class="row g-3 mb-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Clase</label>
            <select class="form-select" id="skills-class"></select>
          </div>
          <div class="col-md-4 d-none" id="admin-skills-actions">
            <button type="button" id="btn-add-skill" class="btn btn-sm btn-swrp btn-swrp-primary">+ Habilidad</button>
          </div>
        </div>
        <div id="skills-list" class="swrp-panel"></div>
      </div>

      <div class="tab-pane fade" id="tab-species">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <p class="small text-muted mb-0">Especies disponibles en personajes y NPCs.</p>
          <div class="d-none" id="admin-species-actions">
            <button type="button" id="btn-add-species" class="btn btn-sm btn-swrp btn-swrp-primary">+ Especie</button>
          </div>
        </div>
        <div id="species-list" class="swrp-panel swrp-species-list"></div>
      </div>

      <div class="tab-pane fade" id="tab-npcs">
        <div class="row g-3 mb-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label" for="npc-filter-name">Nombre</label>
            <input type="search" class="form-control" id="npc-filter-name" placeholder="Buscar por nombre…" autocomplete="off">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="npc-filter-class">Clase</label>
            <select class="form-select" id="npc-filter-class"></select>
          </div>
          <div class="col-md-3">
            <label class="form-label" for="npc-filter-era">Era</label>
            <select class="form-select" id="npc-filter-era"></select>
          </div>
          <div class="col-md-2 d-none" id="admin-npcs-actions">
            <a href="character-create?mode=npc" id="btn-new-npc" class="btn btn-sm btn-swrp btn-swrp-primary">+ Crear NPC</a>
          </div>
        </div>
        <div id="npcs-list" class="npcs-grid"></div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="skillModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content swrp-modal-card">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title">Habilidad</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="skill-edit-idx">
          <input type="hidden" id="skill-edit-class">
          <div class="mb-2">
            <label class="form-label">ID interno</label>
            <input type="text" class="form-control form-control-sm" id="skill-edit-id">
          </div>
          <div class="mb-2">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" id="skill-edit-name">
          </div>
          <div class="row g-2 mb-2">
            <div class="col-6">
              <label class="form-label">Desbloqueo</label>
              <select class="form-select" id="skill-edit-unlock">
                <option value="always">Siempre (Rol)</option>
                <option value="1">1</option><option value="5">5</option>
                <option value="10">10</option><option value="15">15</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Tipo</label>
              <select class="form-select" id="skill-edit-type">
                <option value="Activa">Activa</option>
                <option value="Pasiva">Pasiva</option>
                <option value="Rol">Rol</option>
              </select>
            </div>
          </div>
          <div class="mb-2">
            <label class="form-label">Descripción</label>
            <textarea class="form-control" id="skill-edit-desc" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn btn-swrp btn-swrp-ghost" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-save-skill" class="btn btn-swrp btn-swrp-primary">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="speciesModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content swrp-modal-card">
        <div class="modal-header border-secondary border-opacity-25">
          <h5 class="modal-title">Especie</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="species-edit-idx">
          <label class="form-label" for="species-edit-name">Nombre</label>
          <input type="text" class="form-control" id="species-edit-name" maxlength="60" placeholder="Ej. Humanos">
        </div>
        <div class="modal-footer border-secondary border-opacity-25">
          <button type="button" class="btn btn-swrp btn-swrp-ghost" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-save-species" class="btn btn-swrp btn-swrp-primary">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { renderNavbar } from './js/navbar.js';
    import { requireAuth, isAdmin } from './js/auth.js';
    import { initCompendiumPage } from './js/compendium-page.js';

    const { user, profile } = await requireAuth();
    const userIsAdmin = isAdmin(profile);
    renderNavbar('compendium', user, { isAdmin: userIsAdmin });
    await initCompendiumPage({ isAdmin: userIsAdmin });

    if (window.location.hash === '#npcs') {
      document.querySelector('[data-bs-target="#tab-npcs"]')?.click();
    } else if (window.location.hash === '#species') {
      document.querySelector('[data-bs-target="#tab-species"]')?.click();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
